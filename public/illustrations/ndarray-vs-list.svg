<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none" aria-hidden="true">
  <rect width="420" height="200" rx="10" fill="#0a0d13" stroke="#1c2433" stroke-width="1"/>
  <text x="24" y="32" fill="#eaeff6" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="700">Python list</text>
  <g stroke="#1c2433" stroke-width="1.5">
    <rect x="24" y="48" width="44" height="36" rx="4" fill="#141a24"/>
    <rect x="76" y="48" width="44" height="36" rx="4" fill="#141a24"/>
    <rect x="128" y="48" width="44" height="36" rx="4" fill="#141a24"/>
    <rect x="180" y="48" width="44" height="36" rx="4" fill="#141a24"/>
  </g>
  <text x="46" y="72" fill="#8d98ab" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">1</text>
  <text x="98" y="72" fill="#8d98ab" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">2</text>
  <text x="150" y="72" fill="#8d98ab" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">3</text>
  <text x="202" y="72" fill="#8d98ab" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">4</text>
  <text x="24" y="108" fill="#8d98ab" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="11">Separate Python objects &#8212; slow loops, no vector math</text>

  <text x="24" y="142" fill="#eaeff6" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="700">NumPy ndarray</text>
  <rect x="24" y="152" width="200" height="40" rx="6" fill="#141a24" stroke="#e8843c" stroke-width="1.5"/>
  <text x="124" y="178" fill="#eaeff6" font-family="JetBrains Mono, monospace" font-size="12" text-anchor="middle">[1, 2, 3, 4] contiguous block</text>
  <text x="24" y="196" fill="#8d98ab" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="11">One typed buffer &#8212; fast, vectorized ops</text>
