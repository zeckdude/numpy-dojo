<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" fill="none" aria-hidden="true">
  <rect width="420" height="180" rx="10" fill="#0a0d13" stroke="#1c2433" stroke-width="1"/>
  <text x="210" y="28" fill="#eaeff6" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">View shares memory &#183; copy is independent</text>
  <text x="24" y="58" fill="#8d98ab" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="11">Original array</text>
  <rect x="24" y="66" width="200" height="36" rx="4" fill="#141a24" stroke="#1c2433" stroke-width="1"/>
  <text x="124" y="90" fill="#eaeff6" font-family="JetBrains Mono, monospace" font-size="11" text-anchor="middle">[10, 20, 30, 40, 50]</text>
  <text x="24" y="118" fill="#e8843c" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="11" font-weight="600">Slice view a[1:4]</text>
  <path d="M 84 102 L 84 118" stroke="#e8843c" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="64" y="124" width="120" height="32" rx="4" fill="rgba(232,132,60,0.15)" stroke="#e8843c" stroke-width="1"/>
  <text x="124" y="144" fill="#eaeff6" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">same buffer</text>
  <text x="240" y="118" fill="#5ea3f8" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="11" font-weight="600">.copy()</text>
  <path d="M 164 118 L 220 118" stroke="#5ea3f8" stroke-width="1.5" marker-end="url(#arr2)"/>
  <rect x="228" y="124" width="168" height="32" rx="4" fill="rgba(94,163,248,0.12)" stroke="#5ea3f8" stroke-width="1"/>
  <text x="312" y="144" fill="#eaeff6" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">new buffer &#8212; safe</text>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e8843c"/></marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5ea3f8"/></marker>
  </defs>
  <text x="210" y="170" fill="#8d98ab" font-family="IBM Plex Sans, system-ui, sans-serif" font-size="10" text-anchor="middle">Mutating a view can surprise you; copy when you need isolation</text>
</svg>
